server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  profiles:
    active: dev
  application:
    name: biblequiz-api

  datasource:
    url: jdbc:mysql://localhost:3307/biblequiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: never
      continue-on-error: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
            redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:YmlibGVxdWl6LXN1cGVyLXNlY3JldC1qd3Qta2V5LTIwMjQtbWFrZS1pdC1sb25nLWFuZC1yYW5kb20=}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

biblequiz:
  auth:
    google:
      android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.biblequiz: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# FIX #2: Comma-separated list of trusted proxy IP addresses.
# Rate limiter will trust X-Forwarded-For ONLY when the direct TCP peer is in this list.
# Example for production behind a known load-balancer: "10.0.0.1,172.16.0.2"
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

app:
  trusted-proxies: ${TRUSTED_PROXIES:}
  cookie:
    # Set to true in production (HTTPS). Keep false for local HTTP development.
    secure: ${COOKIE_SECURE:false}
  rate-limit:
    admin:
      requests: ${RATE_LIMIT_ADMIN_REQUESTS:100}
      window: ${RATE_LIMIT_ADMIN_WINDOW:3600}
    general:
      requests: ${RATE_LIMIT_GENERAL_REQUESTS:1000}
      window: ${RATE_LIMIT_GENERAL_WINDOW:3600}
  seeding:
    questions:
      # Runtime JSON-based question seeder (infrastructure/seed/question/QuestionSeeder).
      # Reads src/main/resources/seed/questions/*_quiz.json on startup.
      # Idempotent: deterministic UUIDs per question → second startup no-ops.
      # Disable after a one-shot production seed if further boot-time work is undesired.
      enabled: ${QUESTION_SEEDING_ENABLED:true}
      # Pattern matches VI (*_quiz.json) + EN (*_quiz_en.json) seed files.
      pattern: ${QUESTION_SEEDING_PATTERN:classpath*:seed/questions/*_quiz*.json}
