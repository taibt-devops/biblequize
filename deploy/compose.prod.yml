services:
  mysql:
    image: mysql:8.0
    container_name: biblequiz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: biblequiz
      MYSQL_USER: biblequiz
      MYSQL_PASSWORD: pass
    volumes:
      - /opt/biblequiz/data/mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biblequiz-redis
    restart: unless-stopped
    volumes:
      - /opt/biblequiz/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  api:
    image: taibt2docker/biblequiz-be:latest
    container_name: biblequiz-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OAUTH2_REDIRECT_URI: https://be.quize.top/login/oauth2/code/google
      APP_FRONTEND_URL: https://www.quize.top
      DB_URL: jdbc:mysql://mysql:3306/biblequiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci
      DB_USER: biblequiz
      DB_PASS: pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 2y3VJvKq3yO9lWqA1mJr5yJ1ZfQk7bHRrX9JwR3fT8mL2CqN5pSd8UwZ0rB6Xy1hD4sN8vQ6cT2mP9aL7yK3gF1qR5zU8
      CORS_ORIGINS: https://www.quize.top,https://quize.top,https://be.quize.top
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SERVER_SERVLET_SESSION_COOKIE_DOMAIN: quize.top
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
      SERVER_SERVLET_SESSION_COOKIE_SAME_SITE: lax
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      APP_TEST_DATA_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: taibt2docker/biblequiz-fe:latest
    container_name: biblequiz-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
